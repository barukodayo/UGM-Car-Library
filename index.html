const TABS=["コンパクト","クーペ","EV","OFF-RORD","セダン","スポーツ","SUV","バイク"];let currentCategory="";let showFavoritesOnly=false;let favorites=JSON.parse(localStorage.getItem("ugm_car_favorites_v1_filled")||"[]");function esc(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}function norm(v){return String(v||"").toLowerCase().replace(/\s+/g,"");}function num(v){const n=Number(String(v||"").replace(/[^0-9.]/g,""));return Number.isFinite(n)?n:0;}function fav(id){return favorites.includes(id);}function saveFav(){localStorage.setItem("ugm_car_favorites_v1_filled",JSON.stringify(favorites));}function toggleFav(id,e){e.stopPropagation();const btn=e.currentTarget;favorites=fav(id)?favorites.filter(x=>x!==id):[...favorites,id];saveFav();btn.classList.add("spark");setTimeout(()=>render(),180);}function img(src,cls){return src?`<div class="${cls}"><img src="${esc(src)}" onerror="this.parentElement.textContent='画像準備中'"></div>`:`<div class="${cls}">画像準備中</div>`;}function softRender(){const g=document.getElementById("grid");if(g){g.classList.add("switching");setTimeout(()=>{render();requestAnimationFrame(()=>g.classList.remove("switching"));},110);}else{render();}}function setCategory(cat){currentCategory=cat;showFavoritesOnly=false;document.getElementById("favToggle").textContent="☆ お気に入り";softRender();}function buildCategories(){const counts={};CAR_DATA.forEach(c=>counts[c.category]=(counts[c.category]||0)+1);document.getElementById("categoryList").innerHTML=`<button class="cat-btn ${currentCategory===""?"active":""}" onclick="setCategory('')"><span>▦ すべて</span><span class="pill">${CAR_DATA.length}</span></button>`+TABS.map(t=>`<button class="cat-btn ${currentCategory===t?"active":""}" onclick="setCategory('${t}')"><span>🚙 ${t}</span><span class="pill">${counts[t]||0}</span></button>`).join("");}function filtered(){const q=norm(document.getElementById("searchInput").value);const sort=document.getElementById("sortSelect").value;let list=CAR_DATA.filter(c=>(!currentCategory||c.category===currentCategory)&&(!showFavoritesOnly||fav(c.id))&&(!q||norm([c.name,c.fullName,c.model,c.impression,c.description].join(" ")).includes(q)));if(sort==="nameAsc")list.sort((a,b)=>a.name.localeCompare(b.name,"ja"));if(sort==="priceAsc")list.sort((a,b)=>num(a.price)-num(b.price));if(sort==="priceDesc")list.sort((a,b)=>num(b.price)-num(a.price));if(sort==="speedDesc")list.sort((a,b)=>num(b.speed)-num(a.speed));if(sort==="seatsDesc")list.sort((a,b)=>num(b.seats)-num(a.seats));return list;}function render(){buildCategories();const list=filtered();const title=showFavoritesOnly?"お気に入り":(currentCategory||"すべての車両");document.getElementById("panelTitle").textContent=`${title} (${list.length}台)`;document.getElementById("status").textContent=`全${CAR_DATA.length}台 / 表示${list.length}台`;document.getElementById("grid").innerHTML=list.length?list.map(c=>`<article class="card" onclick="showDetail('${esc(c.id)}')"><button class="star ${fav(c.id)?"active":""}" onclick="toggleFav('${esc(c.id)}',event)">${fav(c.id)?"★":"☆"}</button>${img(c.image,"thumb")}<div class="body"><h3 class="name">${esc(c.name)}</h3><div class="badge">${esc(c.category)}</div><div class="price">${esc(c.price||"-")}</div><div class="spec"><span>最高速</span><strong>${esc(c.speed||"-")}</strong></div><div class="spec"><span>乗車人数</span><strong>${esc(c.seats||"-")}</strong></div><div class="spec"><span>積載</span><strong>${esc(c.load||"-")}</strong></div></div></article>`).join(""):`<div class="empty">該当する車両がありません。</div>`;}function showDetail(id){const c=CAR_DATA.find(x=>x.id===id);if(!c)return;document.getElementById("modalContent").innerHTML=`<h2 class="detail-title">${esc(c.name)}</h2><div class="detail-grid"><div>${img(c.image,"detail-img")}</div><div><table><tr><th>カテゴリ</th><td>${esc(c.category)}</td></tr><tr><th>正式名</th><td>${esc(c.fullName||"-")}</td></tr><tr><th>モデル名</th><td>${esc(c.model||"-")}</td></tr><tr><th>価格</th><td>${esc(c.price||"-")}</td></tr><tr><th>最高速</th><td>${esc(c.speed||"-")}</td></tr><tr><th>乗車人数</th><td>${esc(c.seats||"-")}</td></tr><tr><th>積載</th><td>${esc(c.load||"-")}</td></tr></table>${c.impression?`<div class="text-box"><h3>感想</h3>${esc(c.impression)}</div>`:""}${c.description?`<div class="text-box"><h3>解説</h3>${esc(c.description)}</div>`:""}${c.custom?`<div class="text-box"><h3>カスタム</h3>${esc(c.custom)}</div>`:""}${c.origin?`<div class="text-box"><h3>元ネタ解説</h3>${esc(c.origin)}</div>`:""}</div></div>`;document.getElementById("modalWrap").classList.add("open");}function hideDetail(){document.getElementById("modalWrap").classList.remove("open");}document.getElementById("searchInput").addEventListener("input",softRender);document.getElementById("sortSelect").addEventListener("change",softRender);document.getElementById("favToggle").addEventListener("click",()=>{showFavoritesOnly=!showFavoritesOnly;currentCategory="";document.getElementById("favToggle").textContent=showFavoritesOnly?"★ 全車両に戻る":"☆ お気に入り";softRender();});render();window.addEventListener("load",()=>setTimeout(()=>document.getElementById("loader")?.classList.add("hide"),450));</script></body></html>
